version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: techcorp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: techcorp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: techcorp_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techcorp_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:1234@postgres:5432/techcorp"
      MONGO_URI: "mongodb://mongo:27017/techcorp"
      JWT_SECRET: "techcorp_super_secret_2024"
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techcorp_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
